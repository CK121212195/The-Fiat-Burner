    body {
      margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif;

    h1 {
      font-family: 'Press Start 2P', cursive; color: #f7931a;
      margin-top: 20px; font-size: 1.5rem; text-shadow: 0 0 10px #f7931a; line-height: 1.5;
    }
    .global-stats {
      background: #222; padding: 15px 20px; border-radius: 10px; border: 1px solid #f7931a;
      margin: 10px 0; font-size: 0.9rem; font-weight: bold; width: 85%; max-width: 400px;
    }
    .total-number { color: #00ff00; font-size: 1.4rem; font-family: 'Press Start 2P', cursive; margin-top: 10px; word-break: break-all;}

      width: 300px; height: 150px; display: flex; justify-content: center; align-items: center;
      font-size: 80px; margin: 10px 0; position: relative;
    }
    .fiat-money { transition: all 0.5s ease; }
    .burning { animation: shakeAndBurn 2s forwards; }
    @keyframes shakeAndBurn {
      0% { transform: scale(1) rotate(0deg); }
      20% { transform: scale(1.1) rotate(10deg); filter: sepia(1) hue-rotate(-50deg) saturate(5) brightness(1.2); }
      40% { transform: scale(1.1) rotate(-10deg); filter: sepia(1) hue-rotate(-50deg) saturate(5) brightness(1.5); }
      60% { transform: scale(1.2) translateY(-20px); opacity: 1; }
      100% { transform: scale(0.5) translateY(-100px); opacity: 0; }
    }
    .fire-emoji { position: absolute; font-size: 150px; opacity: 0; pointer-events: none; }
    .show-fire { animation: explodeFire 2s forwards; }
    @keyframes explodeFire {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.5); }
      100% { opacity: 0; transform: scale(2); }
    }

    .btn-group { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 350px; }
    .btn {
      background: #f7931a; color: #111; border: none; padding: 15px;
      font-size: 1rem; font-weight: bold; border-radius: 5px; cursor: pointer;
      text-transform: uppercase; box-shadow: 0 4px 15px rgba(247, 147, 26, 0.4);
      font-family: 'Press Start 2P', cursive; transition: 0.2s;
    }
    .btn:active { transform: translateY(4px); box-shadow: none; }
    .btn-chad { background: #ff5500; color: #fff; box-shadow: 0 4px 15px rgba(255, 85, 0, 0.4); }
    .btn-whale { background: #ff0000; color: #fff; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.6); }
    .btn:disabled { background: #555; color: #888; cursor: not-allowed; }
    .btn-free { background: #00ff00; color: #111; box-shadow: 0 4px 15px rgba(0, 255, 0, 0.4); }

    /* CSSのバグを修正 */
    .invoice-container, #gacha-result { 
      display: none; background: #222; padding: 20px; border-radius: 10px; 
      margin-top: 10px; width: 85%; max-width: 350px; border: 1px solid #444;
    }
    .qr-box img { border: 5px solid #fff; border-radius: 5px; width: 200px; height: 200px;}
    .invoice-text { width: 100%; height: 40px; margin-top: 10px; background: #111; color: #00ff00; border: 1px solid #333; font-family: monospace; font-size: 0.8rem; }
    
    .meme-img { width: 100%; border-radius: 5px; border: 2px solid #f7931a; margin-bottom: 10px; }
    .meme-quote { font-style: italic; color: #ddd; margin-bottom: 15px; font-size: 0.9rem; line-height: 1.4; }
    input[type="text"] { width: 85%; padding: 12px; font-size: 0.8rem; font-family: 'Press Start 2P', cursive; background: #111; color: #fff; border: 1px solid #f7931a; border-radius: 5px; text-align: center; margin-bottom: 15px; }

    .leaderboard { width: 85%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 10px; margin: 30px 0; border: 1px solid #333; }
    .leaderboard h2 { color: #f7931a; font-family: 'Press Start 2P', cursive; font-size: 1rem; margin-bottom: 20px; text-align: center;}
    .lb-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #444; font-family: monospace; font-size: 0.9rem;}
    .lb-row span:nth-child(1) { color: #fff; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; text-align: left; }

      { img: "https://media.giphy.com/media/HhTXt43pk1I1W/giphy.gif", quote: "Banks are the middleman we no longer need." },
      { img: "https://media.giphy.com/media/trN9ht5RlE3Dcwavg2/giphy.gif", quote: "Running a node is how you verify." },
      { img: "https://media.giphy.com/media/5efT8LI3xGIG4/giphy.gif", quote: "Welcome to the Citadel." },
      { img: "https://media.giphy.com/media/xT0xeJpnrWC4XWblOU/giphy.gif", quote: "Fiat is a hallucination. Bitcoin is reality." }
    ];

    window.onload = () => { 
      checkFirstTime();
      fetchStats(); 
    };

    function checkFirstTime() {
      const isFirstTime = !localStorage.getItem('fiat_burner_played');
      if (isFirstTime) {
        document.getElementById('free-btn').style.display = 'block';
        document.getElementById('paid-btns').style.display = 'none';
      } else {
        document.getElementById('free-btn').style.display = 'none';
        document.getElementById('paid-btns').style.display = 'flex';
      }
    }

    function playFree() {
      if (isBurning) return;
      isBurning = true;
      localStorage.setItem('fiat_burner_played', 'true');
      
      currentBurnData.sats = 0;
      currentBurnData.fiat = 1000000;
      
      document.getElementById('action-area').style.display = 'none';
      executeBurn();
    }

    function fetchStats() {
      fetch(`${GAS_URL}?action=getStats`)
        .then(res => res.json())
        .then(data => {
          document.getElementById('total-burned').innerText = (data.totalBurned || 0).toLocaleString();
          renderLeaderboard(data.leaderboard);
        }).catch(err => console.error("Leaderboard error:", err));
    }

    function renderLeaderboard(board) {
      const container = document.getElementById('leaderboard-content');
      container.innerHTML = "";
      if (!board || board.length === 0) {
        container.innerHTML = "<p style='color:#888'>No plebs yet. Be the first!</p>";
        return;
      }
      board.forEach((user, index) => {
        const row = document.createElement('div');
        row.className = index === 0 ? "lb-row top1" : "lb-row";
        let rankStr = index === 0 ? "👑" : `#${index+1}`;
        row.innerHTML = `<span>${rankStr} ${user.name}</span><span>${user.sats.toLocaleString()} sats</span>`;
        container.appendChild(row);
      });
    }

    function generateInvoice(satsAmount, fiatAmount) {
      if (isBurning) return;
      currentBurnData.sats = satsAmount;
      currentBurnData.fiat = fiatAmount;

      document.getElementById('action-area').style.display = 'none';
      document.getElementById('invoice-container').style.display = 'block';

      fetch(LNBITS_API_URL, {
        method: "POST",
        headers: { "X-Api-Key": LNBITS_API_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ out: false, amount: satsAmount, memo: `Burn $${(fiatAmount/1000000)}M Fiat 🔥` })
      })
      .then(res => res.json())
      .then(data => {
        currentPaymentHash = data.payment_hash;
        const invoice = data.payment_request;
        document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=lightning:${invoice}`;
        document.getElementById('lightning-link').href = `lightning:${invoice}`;
        document.getElementById('invoice-text').value = invoice;
        
        setTimeout(() => { window.location.href = `lightning:${invoice}`; }, 800);
        pollPaymentStatus(currentPaymentHash);
      })
      .catch(err => {
        alert("Invoice generation failed.");
        location.reload();
      });
    }

    function pollPaymentStatus(hash) {
      if (checkPaymentInterval) clearInterval(checkPaymentInterval);
      checkPaymentInterval = setInterval(() => {
        fetch(`${LNBITS_API_URL}/${hash}`, { method: "GET", headers: { "X-Api-Key": LNBITS_API_KEY } })
        .then(res => res.json())
        .then(data => {
          if (data.paid && !isBurning) {
            isBurning = true;
            clearInterval(checkPaymentInterval);
            executeBurn();
          }
        }).catch(console.error);
      }, 3000);
    }

    function verifyPayment() {
      if (!currentPaymentHash || isBurning) return;
      fetch(`${LNBITS_API_URL}/${currentPaymentHash}`, { method: "GET", headers: { "X-Api-Key": LNBITS_API_KEY } })
      .then(res => res.json())
      .then(data => {
        if (data.paid && !isBurning) {
          isBurning = true;
          clearInterval(checkPaymentInterval);
          executeBurn();
        } else {
          alert("Payment not received yet. Keep waiting!");
        }
      });
    }

    // 炎上アニメーションと結果の出し分け処理
    function executeBurn() {
      document.getElementById('invoice-container').style.display = 'none';
      const fiat = document.getElementById('fiat');
      const fire = document.getElementById('fire');

      fiat.classList.add('burning');
      fire.classList.add('show-fire');

      const randomMeme = memes[Math.floor(Math.random() * memes.length)];
      currentBurnData.meme = randomMeme;

      setTimeout(() => {
        fiat.innerText = "💸";
        document.getElementById('meme-image').src = randomMeme.img;
        document.getElementById('meme-text').innerText = `"${randomMeme.quote}"`;
        document.getElementById('gacha-result').style.display = 'block';

        // ★無料プレイか課金かで表示する要素を変える★
        if (currentBurnData.sats === 0) {
          // 無料の場合はフォームを出さずに、再プレイ(課金)を促すボタンを表示
          document.getElementById('free-result-actions').style.display = 'block';
        } else {
          // 課金の場合は名前入力フォームを表示
          document.getElementById('name-form-container').style.display = 'block';
        }
      }, 2200);
    }

    // 名前をGASに送信
    function submitScore() {
      let name = document.getElementById('pleb-name').value.trim();
      if (!name) name = "Anon Pleb";
      
      const btn = document.querySelector('#name-form-container button');
      btn.innerText = "SAVING...";
      btn.disabled = true;

      const url = `${GAS_URL}?action=record&name=${encodeURIComponent(name)}&sats=${currentBurnData.sats}&fiat=${currentBurnData.fiat}`;
      
      fetch(url)
        .then(res => res.json())
        .then(data => {
          document.getElementById('name-form-container').style.display = 'none';
          document.getElementById('paid-result-actions').style.display = 'block';
          fetchStats(); 
        })
        .catch(() => {
          alert("Error saving your name. But your sats are burned!");
          document.getElementById('name-form-container').style.display = 'none';
          document.getElementById('paid-result-actions').style.display = 'block';
        });
    }

    // Xへのシェア（無料か課金かでテキストを分ける）
    function shareToX() {
      const fiatStr = currentBurnData.fiat >= 100000000 ? "$100M" : currentBurnData.fiat >= 10000000 ? "$10M" : "$1M";
      let text = "";
      
      if (currentBurnData.sats === 0) {
        text = `I just burned ${fiatStr} of Fiat currency for FREE! 🔥\n\nThe Universe gave me this message:\n"${currentBurnData.meme.quote}"\n\nI'm gonna pay real Sats to enter the Leaderboard next. 👇\n#Bitcoin #LightningNetwork`;
      } else {
        text = `I just burned ${fiatStr} of Fiat currency for ${currentBurnData.sats.toLocaleString()} sats! 🔥\n\nThe Universe gave me this message:\n"${currentBurnData.meme.quote}"\n\nAre you a bigger whale than me? Prove your work. 👇\n#Bitcoin #LightningNetwork`;
      }

      const appUrl = "https://ck121212195.github.io/The-Fiat-Burner/";
      const xUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(appUrl)}`;
      window.open(xUrl, '_blank');
    }
  </script>
