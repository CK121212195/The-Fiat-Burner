<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 THE FIAT BURNER 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
  
  <style>
    /* ビットコイン＆サイバーパンク風のスタイル */
    body {
      margin: 0; padding: 0; font-family: 'Noto Sans JP', sans-serif;
      background-color: #111; color: #fff; text-align: center;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    h1 {
      font-family: 'Press Start 2P', cursive; color: #f7931a; /* ビットコインオレンジ */
      margin-top: 40px; font-size: 1.5rem; text-shadow: 0 0 10px #f7931a;
      line-height: 1.5;
    }
    .global-stats {
      background: #222; padding: 15px 30px; border-radius: 10px; border: 1px solid #f7931a;
      margin: 20px 0; font-size: 1.2rem; font-weight: bold;
    }
    .total-number { color: #00ff00; font-size: 1.8rem; font-family: 'Press Start 2P', cursive; margin-top: 10px;}
    
    /* 燃やされるFiatのアニメーション領域 */
    .stage {
      width: 300px; height: 200px; display: flex; justify-content: center; align-items: center;
      font-size: 100px; margin: 30px 0; position: relative;
    }
    .fiat-money { transition: all 0.5s ease; }
    
    /* 炎のアニメーション */
    .burning { animation: shakeAndBurn 2s forwards; }
    @keyframes shakeAndBurn {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      20% { transform: scale(1.1) rotate(10deg); filter: sepia(1) hue-rotate(-50deg) saturate(5) brightness(1.2); }
      40% { transform: scale(1.1) rotate(-10deg); filter: sepia(1) hue-rotate(-50deg) saturate(5) brightness(1.5); }
      60% { transform: scale(1.2) translateY(-20px); opacity: 1; }
      100% { transform: scale(0.5) translateY(-100px); opacity: 0; display: none; }
    }
    .fire-emoji {
      position: absolute; font-size: 150px; opacity: 0; pointer-events: none;
    }
    .show-fire { animation: explodeFire 2s forwards; }
    @keyframes explodeFire {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.5); }
      100% { opacity: 0; transform: scale(2); }
    }

    /* ボタン・インボイス類 */
    .btn {
      background: #f7931a; color: #111; border: none; padding: 15px 30px;
      font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer;
      text-transform: uppercase; box-shadow: 0 4px 15px rgba(247, 147, 26, 0.4);
      transition: all 0.2s; margin-bottom: 20px; font-family: 'Press Start 2P', cursive;
    }
    .btn:active { transform: translateY(4px); box-shadow: none; }
    .btn-secondary { background: #333; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    
    /* X (Twitter) シェアボタン */
    .btn-x {
      background: #000; color: #fff; border: 2px solid #fff;
      display: none; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-x svg { width: 20px; fill: #fff; }

    .invoice-container { display: none; background: #222; padding: 20px; border-radius: 10px; margin-top: 10px; }
    .qr-box img { border: 5px solid #fff; border-radius: 5px; }
    .invoice-text { width: 100%; height: 50px; margin-top: 10px; background: #111; color: #00ff00; border: 1px solid #333; font-family: monospace; }
    
    #success-message { display: none; color: #f7931a; font-size: 1.5rem; font-weight: bold; margin: 20px 0; }
  </style>
</head>
<body>

  <h1>🔥 THE FIAT BURNER 🔥</h1>

  <div class="global-stats">
    Global Fiat Burned by Plebs<br>
    <div class="total-number">$<span id="total-burned">Loading...</span></div>
  </div>

  <div class="stage" id="stage">
    <div class="fiat-money" id="fiat">💵</div>
    <div class="fire-emoji" id="fire">🔥</div>
  </div>

  <div id="action-area">
    <button class="btn" id="generate-btn" onclick="generateInvoice()">BURN $1,000,000<br><span style="font-size: 0.7rem;">(Pay 100 sats)</span></button>
  </div>

  <div class="invoice-container" id="invoice-container">
    <div class="qr-box">
      <a id="lightning-link" href="#"><img id="qr-code" src="" alt="Lightning Invoice" width="200" height="200"></a>
    </div>
    <p style="font-size: 0.8rem; margin: 10px 0;">Tap QR to open wallet</p>
    <textarea class="invoice-text" id="invoice-text" readonly onclick="this.select()"></textarea>
    <br><br>
    <button class="btn btn-secondary" onclick="verifyPayment()">VERIFY PAYMENT</button>
  </div>

  <div id="success-message">
    SUCCESS! $1M BURNED 🔥<br>Fiat is a scam.
  </div>

  <!-- X(Twitter)共有ボタン -->
  <button class="btn btn-x" id="share-btn" onclick="shareToX()">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    SHARE YOUR PROOF OF WORK
  </button>

  <script>
    // ⚠️ 1. あなたの LNBits (demoサーバー) の Invoice/read key
    const LNBITS_API_KEY = "67e5b0ad270f44d19e6d768bb3314e49"; 
    const LNBITS_API_URL = "https://demo.lnbits.com/api/v1/payments"; 
    
    // ⚠️ 2. ステップ1で作成した GAS の ウェブアプリURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwLZHLxt0DHxQuTP6x0zqg2ck8Bkg421KnsBWFSz87GBcFb2FZ0uK6zDPvo6EKXMtmtVg/exec";

    let currentPaymentHash = "";
    let globalTotal = 0;

    // ページ読み込み時に現在の総燃焼額を取得する
    window.onload = () => {
      fetch(GAS_URL)
        .then(res => res.json())
        .then(data => {
          globalTotal = data.totalBurned;
          updateTotalDisplay(globalTotal);
        });
    };

    function updateTotalDisplay(amount) {
      document.getElementById('total-burned').innerText = amount.toLocaleString();
    }

    // 100satsのインボイス発行
    function generateInvoice() {
      const btn = document.getElementById('generate-btn');
      btn.innerText = "GENERATING...";
      btn.disabled = true;

      fetch(LNBITS_API_URL, {
        method: "POST",
        headers: { "X-Api-Key": LNBITS_API_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ out: false, amount: 100, memo: "Burn Fiat 🔥" })
      })
      .then(res => res.json())
      .then(data => {
        currentPaymentHash = data.payment_hash;
        const invoice = data.payment_request;
        
        document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=lightning:${invoice}`;
        document.getElementById('lightning-link').href = `lightning:${invoice}`;
        document.getElementById('invoice-text').value = invoice;
        
        document.getElementById('action-area').style.display = 'none';
        document.getElementById('invoice-container').style.display = 'block';
      })
      .catch(err => {
        alert("API Error. Check your LNBits Key.");
        btn.innerText = "BURN $1,000,000";
        btn.disabled = false;
      });
    }

    // 支払い確認とアニメーション発動
    function verifyPayment() {
      if (!currentPaymentHash) return;

      fetch(`${LNBITS_API_URL}/${currentPaymentHash}`, {
        method: "GET",
        headers: { "X-Api-Key": LNBITS_API_KEY }
      })
      .then(res => res.json())
      .then(data => {
        if (data.paid) {
          executeBurn(); // 燃やす！
        } else {
          alert("Payment not found. Send 100 sats first!");
        }
      });
    }

    // 🔥 燃焼演出 ＆ GAS更新
    function executeBurn() {
      document.getElementById('invoice-container').style.display = 'none';
      
      // CSSアニメーションを付与
      document.getElementById('fiat').classList.add('burning');
      document.getElementById('fire').classList.add('show-fire');

      // 演出中にGASにデータを送信（+100万ドル）
      fetch(`${GAS_URL}?action=burn`)
        .then(res => res.json())
        .then(data => {
          globalTotal = data.totalBurned;
        });

      // アニメーション終了(約2秒)後に結果を表示
      setTimeout(() => {
        document.getElementById('fiat').innerText = "💸"; // 燃えカス
        updateTotalDisplay(globalTotal);
        document.getElementById('success-message').style.display = 'block';
        document.getElementById('share-btn').style.display = 'flex';
      }, 2000);
    }

    // X (Twitter) へのシェア機能
    function shareToX() {
      // シェアするテキスト（ハッシュタグ付き）
      const text = `I just burned $1,000,000 of Fiat currency for 100 sats! 🔥\n\nTotal Fiat burned by Plebs: $${globalTotal.toLocaleString()}\n\n#Bitcoin #FiatBurner #LightningNetwork`;
      
      // ⚠️ あなたの GitHub Pages のURLに変更してください（宣伝用）
      const appUrl = "https://your-github-username.github.io/fiat-burner/"; 

      const xUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(appUrl)}`;
      window.open(xUrl, '_blank');
    }
  </script>
</body>
</html>
